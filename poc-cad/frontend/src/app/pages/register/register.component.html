<div class="flex items-center justify-center min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100">
  <div class="w-full max-w-2xl p-8 bg-white rounded-lg shadow-lg">
    <h1 class="text-3xl font-bold text-center text-gray-900 mb-8">Create Account</h1>

    <div *ngIf="error" class="mb-4 p-4 bg-red-100 text-red-700 rounded">
      {{ error }}
    </div>

    <div *ngIf="success" class="mb-4 p-4 bg-green-100 text-green-700 rounded">
      Registration successful!
    </div>

    <form (ngSubmit)="register()" class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <!-- Contact Details -->
      <h2 class="col-span-full text-lg font-semibold text-gray-900">Contact Details</h2>

      <div>
        <label class="block text-sm font-medium text-gray-700">First Name</label>
        <input
          type="text"
          [(ngModel)]="formData.first_name"
          name="first_name"
          class="w-full px-4 py-2 mt-1 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Last Name</label>
        <input
          type="text"
          [(ngModel)]="formData.last_name"
          name="last_name"
          class="w-full px-4 py-2 mt-1 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Email</label>
        <input
          type="email"
          [(ngModel)]="formData.email"
          name="email"
          class="w-full px-4 py-2 mt-1 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Phone</label>
        <input
          type="tel"
          [(ngModel)]="formData.phone"
          name="phone"
          class="w-full px-4 py-2 mt-1 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Password</label>
        <input
          type="password"
          [(ngModel)]="formData.password"
          name="password"
          class="w-full px-4 py-2 mt-1 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        />
      </div>

      <!-- Company Details -->
      <h2 class="col-span-full text-lg font-semibold text-gray-900 mt-6">Company Details</h2>

      <div>
        <label class="block text-sm font-medium text-gray-700">Company Name</label>
        <input
          type="text"
          [(ngModel)]="formData.company_name"
          name="company_name"
          class="w-full px-4 py-2 mt-1 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Nature of Business</label>
        <select
          [(ngModel)]="formData.nature_of_business"
          name="nature_of_business"
          class="w-full px-4 py-2 mt-1 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        >
          <option value="">Select...</option>
          <option value="manufacturing">Manufacturing</option>
          <option value="engineering">Engineering</option>
          <option value="architecture">Architecture</option>
          <option value="design">Design</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Website</label>
        <input
          type="url"
          [(ngModel)]="formData.website"
          name="website"
          class="w-full px-4 py-2 mt-1 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div class="col-span-full">
        <label class="block text-sm font-medium text-gray-700">Address</label>
        <textarea
          [(ngModel)]="formData.address"
          name="address"
          class="w-full px-4 py-2 mt-1 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          rows="3"
        ></textarea>
      </div>

      <button
        type="submit"
        [disabled]="loading"
        class="col-span-full px-4 py-2 mt-6 font-semibold text-white bg-blue-600 rounded-lg hover:bg-blue-700 disabled:opacity-50"
      >
        {{ loading ? 'Creating Account...' : 'Create Account' }}
      </button>
    </form>

    <div class="mt-6 text-center">
      <p class="text-sm text-gray-600">
        Already have an account?
        <a routerLink="/login" class="text-blue-600 hover:text-blue-800 font-semibold">
          Sign In
        </a>
      </p>
    </div>
